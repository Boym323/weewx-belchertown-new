            yAxis = 1
            yAxis_max = 360
            lineWidth = 0
			name = Směr větru
            [[[[marker]]]]
                enabled = true
            [[[[states]]]]
                [[[[[hover]]]]]
                        lineWidthPlus = 0
        [[[windGust]]]
			name = Nárazový vítr
        [[[windSpeed]]]
            zIndex = 2
			name = Rychlost větru
    
	[[chart3]]
        title = Vlhkost
        [[[outHumidity]]]
            yAxis_min = 0
            yAxis_max = 100

     
   
    [[chart4]]
