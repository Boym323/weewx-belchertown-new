[month]
    # Chart Timespan Defaults
	# generate = daily
    title = "Tento měsíc"
    show_button = true
    button_text = "Měsíční"
    type = spline
    time_length = 2592000 # Last 30 days
    tooltip_date_format = "dddd LL"
    aggregate_type = max
    aggregate_interval = 86400 # 1 day
    gapsize = 86400000 # 1 day in milliseconds

    [[chart1]]
        title = Teplota
        [[[outTemp]]]
            zIndex = 1
            name = Maximální teplota
            color = red
        [[[outTemp_min]]]
            name = Minimální teplota
            observation_type = outTemp
            aggregate_type = min
            color = "#7cb5ec"
    
    [[chart2]]
        # The combined Wind Chart works best in this configuration
        title = Rychlost a směr větru 
        yAxis_min = 0
        [[[windDir]]]
            zIndex = 1
            yAxis = 1
            yAxis_max = 360
            lineWidth = 0
			name = Směr větru
            # Here we can override the timespan default aggregate type with our own specific to this chart
            aggregate_type = avg
            [[[[marker]]]]
                enabled = true
            [[[[states]]]]
                [[[[[hover]]]]]
                        lineWidthPlus = 0
        [[[windGust]]]
			name = Nárazový vítr
        [[[windSpeed]]]
            zIndex = 2
			name = Rychlost větru
    
    [[chart3]]
        title = Srážky
        type = column
        xAxis_groupby = day
        [[[rainTotal]]]
            name = Celkem srážek
    
    [[chart4]]
        title = Tlak vzduchu
        aggregate_type = avg
        [[[barometer]]]
            color = "#BECC00"
                   [[[[numberFormat]]]]
                decimalPoint = "."
                thousandsSep = "" 
    [[chart5]]
        title = Znečištění ovzduší
        [[[pm25_1]]]
    [[chart6]]
        title = Vlhkost půdy
        [[[soilMoist1]]]

	[[solarRadGraph]]
        title = Sluneční záření a UV Index
         [[[radiation]]]
            name = Sluneční záření
            zIndex = 1
            color = "#ffc83f"
            yAxis_label = "W/m2"
        [[[UV]]]
            yAxis = 1
            yAxis_min = 0
            yAxis_max = 14
            color = "#90ed7d"
            yAxis_label = "UV"
            name = UV Index
           	zIndex = 2
			
    [[lightninggroupby]]
        title = Blesková aktivita
        xAxis_groupby = day

        [[[lightning_strike_count]]]
            name = Počet blesků
            aggregate_type=sum
            yAxis_label = Počet blesků
            type = column
            stacking = normal

