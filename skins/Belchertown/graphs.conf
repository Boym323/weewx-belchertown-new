                enabled = true
            [[[[states]]]]
                [[[[[hover]]]]]
                        lineWidthPlus = 0
        [[[windGust]]]
			name = Nárazový vítr
        [[[windSpeed]]]
            zIndex = 2
			name = Rychlost větru
    
    [[chart3]]
